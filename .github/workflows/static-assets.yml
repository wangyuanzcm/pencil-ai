name: static-assets

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-land:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: production
      STATIC_KEEP_VERSIONS: "10"
      STATIC_STORE_ROOT: ${{ github.workspace }}/.static-store
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Sync desktop assets
        run: pnpm --filter design-ai-web sync:desktop-assets

      - name: Build web
        run: pnpm --filter design-ai-web build

      - name: Land static assets
        run: pnpm --filter design-ai-web land:assets

      - name: Upload landed assets
        uses: actions/upload-artifact@v4
        with:
          name: static-assets
          path: .static-store

